<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-AI Lab Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#03050c;
      --panel:rgba(255,255,255,.055);
      --panel2:rgba(255,255,255,.075);
      --line:rgba(255,255,255,.08);
      --text:#f7f7ff;
      --muted:#8b8fa3;
      --cyan:#18d8ff;
      --violet:#b65cff;
      --pink:#ff45c8;
      --green:#41ff8b;
      --orange:#ff8a3d;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:"Noto Sans KR",system-ui,sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(135,42,255,.22), transparent 34%),
        radial-gradient(circle at 88% 18%, rgba(0,255,255,.14), transparent 34%),
        radial-gradient(circle at 45% 78%, rgba(255,0,180,.12), transparent 40%),
        linear-gradient(135deg,#04020a 0%,#050711 45%,#01030a 100%);
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 85%);
    }
    a{color:inherit;text-decoration:none}
    .wrap{
      width:min(1180px,calc(100% - 34px));
      margin:0 auto;
      padding:28px 0 54px;
    }
    header{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:24px;
      align-items:start;
      margin-bottom:28px;
    }
    .brand{
      display:flex;
      gap:16px;
      align-items:center;
    }
    .logo{
      width:58px;height:58px;border-radius:16px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#16e7ff,#754cff 55%,#ff47ca);
      box-shadow:0 0 26px rgba(75,94,255,.65),0 0 42px rgba(255,71,202,.25);
      font-size:28px;
    }
    h1{
      margin:0;
      font-family:"Orbitron",sans-serif;
      font-size:clamp(34px,5vw,58px);
      line-height:1;
      letter-spacing:-1.5px;
      color:#fff;
      text-shadow:0 0 8px rgba(255,255,255,.35),0 0 20px rgba(187,83,255,.9),0 0 36px rgba(24,216,255,.35);
    }
    .subtitle{
      margin:8px 0 0;
      color:#9aa0be;
      font-size:14px;
    }
    .subtitle b{color:#e14cff}
    .search{
      justify-self:end;
      width:min(450px,100%);
      margin-top:2px;
      position:relative;
    }
    .search input{
      width:100%;
      height:54px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:0 18px 0 48px;
      color:#fff;
      background:rgba(0,0,0,.35);
      outline:none;
      box-shadow:inset 0 0 22px rgba(24,216,255,.06);
    }
    .search span{
      position:absolute;left:18px;top:15px;color:#727896;
    }
    nav{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin:28px 0 58px;
    }
    .tab{
      border:1px solid var(--line);
      background:rgba(255,255,255,.07);
      color:#c7cad9;
      border-radius:999px;
      padding:10px 17px;
      font-size:13px;
      cursor:pointer;
      transition:.2s ease;
    }
    .tab:hover,.tab.active{
      color:#fff;
      background:linear-gradient(135deg,rgba(28,225,255,.95),rgba(151,76,255,.95));
      box-shadow:0 0 18px rgba(121,81,255,.6);
      border-color:transparent;
      transform:translateY(-1px);
    }
    .section{
      margin:0 0 66px;
    }
    .section-title{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:18px;
      align-items:center;
      margin:0 0 28px;
      text-align:center;
    }
    .section-title:before,.section-title:after{
      content:"";height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
    }
    .section-title h2{
      margin:0;
      font-family:"Orbitron",sans-serif;
      font-size:17px;
      letter-spacing:1px;
      text-transform:uppercase;
      text-shadow:0 0 14px currentColor;
    }
    .section-title small{
      margin-left:8px;
      font-family:"Noto Sans KR",sans-serif;
      font-size:12px;
      color:#737991;
      text-shadow:none;
      text-transform:none;
    }
    .featured{color:var(--violet)}
    .textllm{color:var(--cyan)}
    .imagevideo{color:#05dfff}
    .edit{color:var(--green)}
    .audio{color:var(--orange)}
    .channels{color:var(--pink)}
    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }
    .card{
      min-height:78px;
      padding:19px 18px;
      border:1px solid var(--line);
      border-radius:14px;
      background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
      box-shadow:inset 0 0 30px rgba(255,255,255,.025),0 14px 34px rgba(0,0,0,.2);
      display:grid;
      grid-template-columns:20px 1fr 38px;
      gap:12px;
      align-items:center;
      transition:.2s ease;
    }
    .card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,255,255,.18);
      background:linear-gradient(135deg,rgba(172,72,255,.18),rgba(0,217,255,.08));
      box-shadow:0 0 24px rgba(148,75,255,.17);
    }
    .handle{color:#5b6079;font-size:18px}
    .name{font-weight:800;font-size:14px;margin-bottom:4px}
    .url{font-size:11px;color:#757b93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .open{
      width:36px;height:36px;border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      display:grid;place-items:center;
      background:rgba(255,255,255,.055);
      color:#aeb4c8;
      font-size:15px;
    }
    footer{
      margin:80px 0 0;
      padding:44px 20px 34px;
      text-align:center;
      background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.45));
      border-top:1px solid var(--line);
    }
    .footer-brand{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      font-family:"Orbitron",sans-serif;
      font-size:24px;
      text-shadow:0 0 18px rgba(160,80,255,.9);
    }
    .mini-logo{
      width:42px;height:30px;border-radius:99px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#15dfff,#8b50ff);
      box-shadow:0 0 18px rgba(80,95,255,.65);
    }
    .footer-desc{color:#888ea5;line-height:1.7;font-size:14px}
    .footer-desc b{color:#ff49c7}
    .footer-links{
      display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:22px 0;
    }
    .footer-links a{
      padding:9px 18px;border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      font-size:13px;
    }
    .dots span{
      display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 4px;
    }
    .dots span:nth-child(1){background:#8a57ff}
    .dots span:nth-child(2){background:#00d9ff}
    .dots span:nth-child(3){background:#ff49c7}
    .dots span:nth-child(4){background:#00ff85}
    .dots span:nth-child(5){background:#ff9a3d}
    .copy{margin-top:18px;color:#666d84;font-size:12px}
    .hide{display:none!important}
    @media(max-width:980px){
      header{grid-template-columns:1fr}
      .search{justify-self:start;width:100%}
      .grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:560px){
      .wrap{width:min(100% - 22px,1180px);padding-top:18px}
      .brand{align-items:flex-start}
      .logo{width:48px;height:48px;border-radius:14px}
      .grid{grid-template-columns:1fr}
      nav{justify-content:flex-start;margin-bottom:42px}
      .section{margin-bottom:48px}
      .card{min-height:72px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="brand">
        <div class="logo">⚡</div>
        <div>
          <h1>K-AI Lab Dashboard</h1>
          <p class="subtitle">AI Tools Collection by <b>JediSam</b></p>
        </div>
      </div>
      <label class="search">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="AI 도구 검색..." />
      </label>
    </header>

    <nav id="tabs">
      <button class="tab active" data-filter="all">전체</button>
      <button class="tab" data-filter="Featured">Featured</button>
      <button class="tab" data-filter="Text / LLM">Text / LLM</button>
      <button class="tab" data-filter="Image / Video">Image / Video</button>
      <button class="tab" data-filter="Edit / Capture">Edit</button>
      <button class="tab" data-filter="Audio / Voice">Audio</button>
      <button class="tab" data-filter="My Channels">Channels</button>
    </nav>

    <div id="app"></div>

    <footer>
      <div class="footer-brand"><span class="mini-logo">⚡</span>K-AI Lab</div>
      <div class="footer-desc">AI 영상 감독 <b>JediSam</b>이 큐레이션한<br>프리미엄 AI 도구 컬렉션</div>
      <div class="footer-links">
        <a href="https://www.youtube.com" target="_blank" rel="noopener">▶ K-AI Lab ↗</a>
        <a href="https://www.youtube.com" target="_blank" rel="noopener">▶ JediSam ↗</a>
      </div>
      <div class="dots"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="copy">© 2026 K-AI Lab. All rights reserved.<br>Powered by AI · Designed with passion</div>
    </footer>
  </main>

  <script>
    // 여기만 수정하면 카드가 자동으로 바뀝니다.
    const sections = [
      {
        title:"Featured",
        tone:"featured",
        tools:[
          ["ChatGPT","chat.openai.com","https://chat.openai.com"],
          ["Gemini","gemini.google.com","https://gemini.google.com"],
          ["GitHub Copilot","github.com","https://github.com/features/copilot"],
          ["Claude","claude.ai","https://claude.ai"]
        ]
      },
      {
        title:"Text / LLM",
        tone:"textllm",
        tools:[
          ["Perplexity","perplexity.ai","https://www.perplexity.ai"],
          ["NotebookLM","notebooklm.google.com","https://notebooklm.google.com"],
          ["OPAL","opal.google","https://opal.google"]
        ]
      },
      {
        title:"Image / Video",
        tone:"imagevideo",
        tools:[
          ["Grok","x.com","https://x.com"],
          ["Google Flow","labs.google","https://labs.google"],
          ["Kling","kling.ai","https://kling.ai"],
          ["Midjourney","midjourney.com","https://www.midjourney.com"],
          ["Flux","flux.ai","https://flux.ai"],
          ["Dreamina","dreamina.capcut.com","https://dreamina.capcut.com"],
          ["Pika","pika.art","https://pika.art"],
          ["Higgsfield","higgsfield.ai","https://higgsfield.ai"],
          ["Genspark","genspark.ai","https://www.genspark.ai"],
          ["DALL-E","openai.com","https://openai.com"],
          ["Canva","www.canva.com","https://www.canva.com"]
        ]
      },
      {
        title:"Edit / Capture",
        tone:"edit",
        tools:[
          ["ilovepdf","www.ilovepdf.com","https://www.ilovepdf.com"],
          ["NotebookLM Remov...","notebooklmremover.com","#"],
          ["X_vid","savewitter.net","https://savewitter.net"],
          ["Utube","ssyoutube.com","https://ssyoutube.com"],
          ["Facebook_vid","snapsaveform.net","#"],
          ["Instagram_vid","snapsaveform.net","#"],
          ["TikTok_vid","snapsaveform.net","#"],
          ["Vid_Watermark_Re...","magiceraser.org","https://magiceraser.org"],
          ["QRcode","genqrcode.com","https://genqrcode.com"],
          ["remove.bg","www.remove.bg","https://www.remove.bg"],
          ["CapCut","www.capcut.com","https://www.capcut.com"]
        ]
      },
      {
        title:"Audio / Voice",
        tone:"audio",
        tools:[
          ["Suno","suno.ai","https://suno.ai"],
          ["ElevenLabs","elevenlabs.io","https://elevenlabs.io"],
          ["Supertone Play","play.supertone.ai","https://play.supertone.ai"],
          ["TTS-Maker","ttsmaker.com","https://ttsmaker.com"],
          ["유튜브 오디오 보관함","studio.youtube.com","https://studio.youtube.com"]
        ]
      },
      {
        title:"My Channels",
        tone:"channels",
        tools:[
          ["Naver Blog","blog.naver.com","https://blog.naver.com"],
          ["litt.ly","litt.ly","https://litt.ly"],
          ["Google Blog","blog.google","https://blog.google"],
          ["K-AI Lab AI 실험실","www.youtube.com","https://www.youtube.com"],
          ["시니어모바일스터디...","www.youtube.com","https://www.youtube.com"],
          ["타임캡슐","www.youtube.com","https://www.youtube.com"],
          ["제디쌤 유튜브","www.youtube.com","https://www.youtube.com"]
        ]
      }
    ];

    const app = document.getElementById("app");
    const searchInput = document.getElementById("searchInput");
    const tabs = document.getElementById("tabs");

    function createCard(tool, sectionTitle){
      const [name, domain, link] = tool;
      return `
        <a class="card" data-section="${sectionTitle}" data-name="${name.toLowerCase()}" data-domain="${domain.toLowerCase()}" href="${link}" target="_blank" rel="noopener">
          <div class="handle">⁝</div>
          <div>
            <div class="name">${name}</div>
            <div class="url">${domain}</div>
          </div>
          <div class="open">↗</div>
        </a>
      `;
    }

    function render(){
      app.innerHTML = sections.map(section => `
        <section class="section" data-section-wrap="${section.title}">
          <div class="section-title ${section.tone}">
            <h2>${section.title}<small>${section.tools.length} tools</small></h2>
          </div>
          <div class="grid">
            ${section.tools.map(tool => createCard(tool, section.title)).join("")}
          </div>
        </section>
      `).join("");
      applyFilter();
    }

    function applyFilter(){
      const active = document.querySelector(".tab.active").dataset.filter;
      const query = searchInput.value.trim().toLowerCase();
      document.querySelectorAll(".section").forEach(section => {
        let visibleCount = 0;
        const sectionName = section.dataset.sectionWrap;
        const sectionAllowed = active === "all" || active === sectionName;
        section.querySelectorAll(".card").forEach(card => {
          const textMatched = !query || card.dataset.name.includes(query) || card.dataset.domain.includes(query);
          const show = sectionAllowed && textMatched;
          card.classList.toggle("hide", !show);
          if(show) visibleCount++;
        });
        section.classList.toggle("hide", visibleCount === 0);
      });
    }

    tabs.addEventListener("click", e => {
      if(!e.target.matches(".tab")) return;
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      e.target.classList.add("active");
      applyFilter();
    });

    searchInput.addEventListener("input", applyFilter);
    render();
  </script>
</body>
</html>
